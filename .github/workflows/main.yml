name: Python Testing Workflow

on:
  pull_request:
    branches:
      - develop

permissions:
  contents: write

jobs:
  test-and-coverage:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov
          pip install -r requirements.txt || true

      - name: Run tests with pytest and check coverage
        run: |
          export PYTHONPATH=.
          python -m pytest tests/ --cov=myapp --cov-fail-under=70 --cov-report=xml

      - name: Upload coverage report artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  build:
    needs: test-and-coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - name: Check and update README with Badge
        run: |
          BADGE="[![Python Testing Workflow](https://github.com/${{ github.repository }}/actions/workflows/main.yml/badge.svg)](https://github.com/${{ github.repository }}/actions/workflows/main.yml)"
          
          if [ ! -f README.md ]; then
            echo "# My Project" > README.md
          fi

          # Перевіряємо, чи є вже такий бейдж
          if grep -q "badge.svg" README.md; then
            echo "Badge already exists. Skipping."
          else
            echo "Adding badge to README.md"
            # Додаємо бейдж у перший рядок файлу
            sed -i "1s|^|$BADGE\n\n|" README.md
          fi

      - name: Commit and Push changes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          # Робимо коміт тільки якщо в README.md дійсно з'явилися зміни
          git diff --quiet && git diff --staged --quiet || (git commit -m "docs: add build status badge to README" && git push)
